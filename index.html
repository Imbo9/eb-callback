<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Finance Tracker — Auth Callback</title>
</head>
<body>
  <p id="msg">Completing authentication, please wait...</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
      document.getElementById('msg').innerHTML =
        '<h2>Error: ' + error + '</h2><p>Close this tab and check the terminal.</p>';
    } else {
      // Forward code + state to the local auth server
      window.location.replace('http://localhost:8080/callback?' + params.toString());
    }
  </script>
</body>
</html>
